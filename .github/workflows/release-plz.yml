# Automated releases: opens a release PR (version bump + changelog) on push to
# main, and publishes to crates.io when that PR merges. RELEASE_PLZ_TOKEN is a
# GitHub PAT (contents + PR write) so release-plz's PRs trigger CI;
# CARGO_REGISTRY_TOKEN is the crates.io token.
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
