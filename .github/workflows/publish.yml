# REVIEW THEN: mv scaffold/publish.yml.proposed .github/workflows/publish.yml
# Publishes the `holdout` crate to crates.io using the CARGO_REGISTRY_TOKEN repo
# secret (already set). Trigger manually (`gh workflow run publish.yml`) or by
# pushing a `v*` tag. Crate name `holdout` is confirmed free; `cargo publish
# --dry-run` is clean.
name: publish
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
